spring:
  application:
    name: watchdog
  # In-Memory-H2 für die Camunda-Prozess-Engine; bleibt offen, solange die JVM läuft.
  datasource:
    url: jdbc:h2:mem:watchdog;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

server:
  port: 8080

camunda:
  bpm:
    # Schema bei Start automatisch anlegen (passt zur flüchtigen In-Memory-DB).
    database:
      schema-update: true
    # Job-Executor wird mit dem Anwendungsstart aktiviert.
    job-execution:
      deployment-aware: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Watchdog-spezifische Einstellungen — werden später an config.WatchdogProperties gebunden.
watchdog:
  poll-interval: 10s
  restart-attempts: 3
  health-check-timeout: 30s
