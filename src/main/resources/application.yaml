spring:
  application:
    name: watchdog
  # In-Memory-H2 für die Camunda-Prozess-Engine; bleibt offen, solange die JVM läuft.
  datasource:
    url: jdbc:h2:mem:watchdog;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

server:
  port: 8080

camunda:
  bpm:
    # Schema bei Start automatisch anlegen (passt zur flüchtigen In-Memory-DB).
    database:
      schema-update: true
    # Job-Executor wird mit dem Anwendungsstart aktiviert.
    job-execution:
      deployment-aware: true
    # Login für die Camunda-Webapps (Cockpit/Tasklist/Admin) unter /camunda.
    admin-user:
      id: admin
      password: admin

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Watchdog-spezifische Einstellungen — gebunden an config.WatchdogProperties.
watchdog:
  poll-interval: 10s
  restart-attempts: 3
  restart-wait: 5s
  health-check-timeout: 30s
  target-containers:
    - target-service-a
    - target-service-b
    - target-service-c
  docker:
    # Windows/Docker-Desktop: Named-Pipe. Unter Linux/Mac: unix:///var/run/docker.sock
    host: npipe:////./pipe/docker_engine
